name: Build and Package on Tag

# 仅在推送以 v 开头的标签时触发
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        include:
          - os: ubuntu-22.04
            qt_version: '6.5.2'
            python_version: '3.10'
          - os: windows-latest
            qt_version: '6.5.2'
            python_version: '3.10'
          - os: macos-latest
            qt_version: '6.5.2'
            python_version: '3.10'
    runs-on: ${{ matrix.os }}

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装 Qt（使用专用 action）
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ matrix.qt_version }}
          # 需要额外的 Qt 模块
          modules: ''

      # 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      # 将 Python 依赖包安装到一个临时目录，便于后续打包
      - name: Install Python packages to temporary directory
        shell: bash  # 使用 bash 以兼容 mkdir -p
        run: |
          mkdir -p _packages
          # 使用 --target 将 websockets 及其所有依赖安装到 _packages 目录
          pip install --target _packages websockets
          # 其他需要打包的 Python 包

      # 配置 CMake
      # 传递 Qt 路径、Python 根目录以及 Python 包目录
      - name: Configure CMake
        shell: bash  # 使用 bash 以支持反斜杠续行
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="${{ env.Qt5_Dir || env.Qt6_Dir }}" \
                -DPython_ROOT_DIR="${{ env.pythonLocation }}" \
                -DPYTHON_PACKAGES_DIR="${{ github.workspace }}/_packages"

      # 编译项目
      - name: Build
        run: cmake --build build --config Release

      # 安装到临时目录，触发 CMakeLists.txt 中定义的安装规则
      - name: Install to temporary directory
        run: cmake --install build --prefix install_root

      # 手动执行 macdeployqt（macOS）- 已有
      - name: Deploy Qt dependencies with macdeployqt (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "Contents of install_root:"
          ls -la install_root/
          echo "Running macdeployqt..."
          macdeployqt install_root/DG-LAB-Client.app -verbose=2

      # Linux 专属步骤：使用 linuxdeployqt 处理 Qt 依赖并生成 AppImage
      - name: Install linuxdeployqt (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget -c https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt-continuous-x86_64.AppImage
          sudo mv linuxdeployqt-continuous-x86_64.AppImage /usr/local/bin/linuxdeployqt

      - name: Deploy Qt and create AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd install_root
          # linuxdeployqt 会自动分析可执行文件的 Qt 依赖并打包成 AppImage
          # 确保可执行文件路径正确（根据 CMake 安装规则，它在根目录下）
          /usr/local/linuxdeployqt DG-LAB-Client -appimage -verbose=2
          # linuxdeployqt 会在当前目录生成 .AppImage 文件
          mkdir -p ../package
          mv *.AppImage ../package/

      # 安装 NSIS
      - name: Install NSIS (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install nsis --no-progress

      # 使用 CPack 生成其他格式的安装包（DEB、RPM、TGZ、NSIS、DMG 等）
      - name: Package with CPack
        run: cpack --config build/CPackConfig.cmake -B package

      # 生成不带 Python 运行时的精简压缩包
      - name: Create without-Python archive
        shell: bash
        run: |
          # 从 tag 获取版本号
          VERSION=${GITHUB_REF_NAME#v}
          echo "Version: $VERSION"

          # 复制完整安装目录
          cp -r install_root install_root_no_python

          # 根据平台删除 Python 运行时、标准库、第三方包
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # Windows: 删除 Python DLL、标准库压缩包、第三方包目录
            rm -rf install_root_no_python/python3*.dll
            rm -rf install_root_no_python/python*.zip
            rm -rf install_root_no_python/DLLs
            rm -rf install_root_no_python/python/Lib
            # 如果存在其他 site-packages 目录
            rm -rf install_root_no_python/python/Lib/site-packages
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            # macOS: 删除 libpython 动态库、标准库目录、第三方包
            rm -rf install_root_no_python/lib/libpython*.dylib
            rm -rf install_root_no_python/Python.framework
            rm -rf install_root_no_python/python/Lib
            rm -rf install_root_no_python/python/Lib/site-packages
          else  # ubuntu-22.04
            # Linux: 删除 libpython 共享库、标准库目录、第三方包
            rm -rf install_root_no_python/lib/libpython*.so*
            rm -rf install_root_no_python/python/Lib
            rm -rf install_root_no_python/python/Lib/site-packages
          fi

          # 打包精简版
          mkdir -p package
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # Windows 使用 ZIP
            (cd install_root_no_python && 7z a ../package/DG-LAB-Client-${VERSION}-windows-without-Python.zip *)
          else
            # macOS / Linux 使用 tar.gz
            (cd install_root_no_python && tar czf ../package/DG-LAB-Client-${VERSION}-${{ runner.os }}-without-Python.tar.gz *)
          fi

      # 将生成的安装包上传为 GitHub Actions 的 Artifact
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DG-LAB-Client-${{ matrix.os }}
          path: |
            package/*.exe
            package/*.deb
            package/*.rpm
            package/*.dmg
            package/*.zip
            package/*.tar.gz
            package/*.AppImage
            package/*-without-Python.zip
            package/*-without-Python.tar.gz
          if-no-files-found: warn
