name: Create GitHub Release with Changelog

on:
  workflow_run:
    workflows: ["Build and Package on Tag"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 下载 build.yml 中上传的所有 artifacts
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all_artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # 将所有下载的 artifacts 中的文件合并到一个目录
      - name: Organize assets
        run: |
          mkdir -p release_assets
          find all_artifacts -type f -exec cp {} release_assets/ \;
          ls -la release_assets/

      # 提取 ChangeLog.md 中的更新日志
      - name: Extract release notes and tag
        id: extract_notes
        run: |
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          echo "Tag: $TAG_NAME"

          awk -v tag="$TAG_NAME" '
          BEGIN {
            header = ""
            body = ""
            footer = ""
            state = 0
            in_target = 0
            target_start = 0
            next_version = 0
          }

          !header_done && /^## \[v/ {
            header_done = 1
            state = 1
          }
          !header_done {
            header = header $0 "\n"
            next
          }

          state == 1 && $0 ~ "^## \\[" tag "\\]" {
            state = 2
            in_target = 1
            body = body $0 "\n"
            next
          }

          state == 2 {
            if ($0 ~ "^## \\[v" || $0 ~ "^## 其他") {
                state = 3
            }
            if (state == 2) {
                body = body $0 "\n"
            }
            if (state == 3) {
                footer_line = $0
            }
            next
          }

          state == 3 && $0 ~ "\\*\\*变动\\*\\*：\\[" tag "\\]:" {
            # 如果上一行是“## 其他”，则一并包含
            if (footer_line ~ "^## 其他") {
                footer = footer_line "\n"
            }
            footer = footer $0 "\n"
            state = 4
          }

          END {
            if (state >= 2 && length(body) > 0) {
                # 输出：全局说明 + 目标版本内容 + 变动链接（如果有）
                printf "%s", header
                printf "%s", body
                if (length(footer) > 0) printf "%s", footer
            } else {
                print "未找到 " tag " 对应的发布说明。"
            }
          }
          ' CHANGELOG.md > /tmp/release_notes.md

          {
            echo 'release_notes<<EOF'
            cat /tmp/release_notes.md
            echo 'EOF'
            echo "tag_name=$TAG_NAME"
          } >> "$GITHUB_OUTPUT"

      # 创建或更新 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_notes.outputs.tag_name }}
          body: ${{ steps.extract_notes.outputs.release_notes }}
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
