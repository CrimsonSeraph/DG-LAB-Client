name: Create GitHub Release with Changelog

on:
  workflow_run:
    workflows: ["Build and Package on Tag"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 下载 build.yml 中上传的所有 artifacts
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all_artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # 将所有下载的 artifacts 中的文件合并到一个目录
      - name: Organize assets
        run: |
          mkdir -p release_assets
          find all_artifacts -type f -exec cp {} release_assets/ \;
          ls -la release_assets/

      # 提取 ChangeLog.md 中的更新日志
      - name: Extract release notes and tag
        id: extract_notes
        run: |
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          echo "Tag: $TAG_NAME"

          awk -v tag="$TAG_NAME" '
          BEGIN {
            state = 0   # 0=收集header，1=寻找目标版本（跳过不匹配的版本块），2=收集目标版本内容，3=收集变动链接
            header = ""
            body = ""
            footer = ""
            skip_unreleased = 0
            found = 0
          }

          # 忽略 # Changelog 和 本文档记录 行
          /^# Changelog/ || /^本文档记录/ { next }

          # 跳过 [Unreleased] 整个区块
          /^## \[Unreleased\]/ {
            skip_unreleased = 1
            next
          }
          skip_unreleased && /^## / {
            skip_unreleased = 0
          }
          skip_unreleased { next }

          # 状态0：收集 header（从文件开始到第一个版本标题之前）
          state == 0 {
            if ($0 ~ /^## \[v/) {
              # 遇到版本标题，检查是否为目标 tag
              if ($0 ~ "^## \\[" tag "\\]") {
                # 匹配成功，进入状态2并记录标题行
                body = body $0 "\n"
                state = 2
                found = 1
                next
              } else {
                # 不是目标 tag，进入状态1跳过当前版本块
                state = 1
                # 当前行是版本标题，但不属于目标，直接跳过该行（不加入任何输出）
                next
              }
            }
            # 未遇到版本标题，继续收集 header
            header = header $0 "\n"
            next
          }

          # 状态1：跳过当前不匹配的版本块，直到下一个版本标题或“## 其他”
          state == 1 {
            if ($0 ~ /^## \[v/ || $0 ~ /^## 其他/) {
              # 遇到新的版本标题或“## 其他”，重新检查
              if ($0 ~ "^## \\[" tag "\\]") {
                # 匹配到目标 tag
                body = body $0 "\n"
                state = 2
                found = 1
              } else {
                # 仍不匹配，继续停留在状态1（跳过这个标题）
                state = 1
              }
            }
            # 无论是否匹配，当前行都不输出（跳过）
            next
          }

          # 状态2：收集目标版本的内容，直到遇到下一个版本标题或“## 其他”
          state == 2 {
            if ($0 ~ /^## \[v/ || $0 ~ /^## 其他/) {
              # 遇到结束标记，转入状态3准备收集变动链接
              state = 3
              next
            }
            body = body $0 "\n"
            next
          }

          # 状态3：收集变动链接行（仅当当前行包含目标 tag 的链接）
          state == 3 {
            if ($0 ~ "\\*\\*变动\\*\\*：\\[" tag "\\]:") {
              footer = footer $0 "\n"
              state = 4
            }
            next
          }

          END {
            if (found) {
              # 输出 header + body + footer，并去除首尾多余换行
              printf "%s", header
              printf "%s", body
              if (footer != "") printf "%s", footer
            } else {
              print "未找到 " tag " 对应的发布说明。" > "/dev/stderr"
              exit 1
            }
          }
          ' CHANGELOG.md > /tmp/release_notes.md

          {
            echo 'release_notes<<EOF'
            cat /tmp/release_notes.md
            echo 'EOF'
            echo "tag_name=$TAG_NAME"
          } >> "$GITHUB_OUTPUT"

      # 创建或更新 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_notes.outputs.tag_name }}
          body: ${{ steps.extract_notes.outputs.release_notes }}
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
