name: Create GitHub Release with Changelog

on:
  workflow_run:
    workflows: ["Build and Package on Tag"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 下载 build.yml 中上传的所有 artifacts
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: all_artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # 将所有下载的 artifacts 中的文件合并到一个目录
      - name: Organize assets
        run: |
          mkdir -p release_assets
          find all_artifacts -type f -exec cp {} release_assets/ \;
          ls -la release_assets/

      # 提取 ChangeLog.md 中的更新日志
      - name: Extract release notes and tag
        id: extract_notes
        run: |
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          echo "Tag: $TAG_NAME"

          awk -v tag="$TAG_NAME" '
          BEGIN {
            state = 0   # 0=收集header，1=寻找目标版本，2=收集内容，3=查找变动链接
            header = ""
            body = ""
            footer = ""
            in_skip = 0
          }

          # 状态0：收集第一个真实版本之前的介绍内容，同时跳过 [Unreleased] 块
          state == 0 {
            # 忽略 # Changelog 和 本文档记录 行
            if ($0 ~ /^# Changelog/ || $0 ~ /^本文档记录/) next

            # 遇到 [Unreleased] 标题，开始跳过其整个区块
            if ($0 ~ /^## \[Unreleased\]/) {
              in_skip = 1
              next
            }

            # 跳过 [Unreleased] 区块内的所有行，直到下一个 ## 标题
            if (in_skip) {
              if ($0 ~ /^## /) {
                in_skip = 0
                # 如果这个标题是真实版本，转入状态1
                if ($0 ~ /^## \[v/) {
                  state = 1
                  next
                }
              }
              next
            }

            # 遇到第一个真实版本标题（如 ## [v0.4.0]），转入状态1
            if ($0 ~ /^## \[v/) {
              state = 1
              next
            }

            # 其他行都归入 header
            header = header $0 "\n"
            next
          }

          # 状态1：查找与 tag 匹配的版本标题
          state == 1 {
            if ($0 ~ "^## \\[" tag "\\]") {
              body = body $0 "\n"
              state = 2
              next
            }
            # 遇到其他版本标题说明目标 tag 不存在
            if ($0 ~ /^## \[v/) {
              print "未找到 " tag " 对应的发布说明。"
              exit 1
            }
            next
          }

          # 状态2：收集目标版本的内容，直到遇到下一个版本标题或“## 其他”
          state == 2 {
            if ($0 ~ /^## \[v/ || $0 ~ /^## 其他/) {
              state = 3
              next
            }
            body = body $0 "\n"
            next
          }

          # 状态3：仅收集当前版本的变动链接行（不包含“## 其他”标题）
          state == 3 {
            if ($0 ~ "\\*\\*变动\\*\\*：\\[" tag "\\]:") {
              footer = footer $0 "\n"
              state = 4
            }
            next
          }

          END {
            if (state >= 2 && length(body) > 0) {
              printf "%s", header
              printf "%s", body
              if (length(footer) > 0) printf "%s", footer
            } else {
                print "未找到 " tag " 对应的发布说明。"
                exit 1
            }
          }
          ' CHANGELOG.md > /tmp/release_notes.md

          {
            echo 'release_notes<<EOF'
            cat /tmp/release_notes.md
            echo 'EOF'
            echo "tag_name=$TAG_NAME"
          } >> "$GITHUB_OUTPUT"

      # 创建或更新 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_notes.outputs.tag_name }}
          body: ${{ steps.extract_notes.outputs.release_notes }}
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
