name: Create GitHub Release with Changelog

on:
  workflow_run:
    workflows: ["Build and Package on Tag"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') }}
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 下载 build.yml 中上传的所有 artifacts
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # 将所有下载的 artifacts 中的文件合并到一个目录
      - name: Organize assets
        run: |
          mkdir -p release_assets
          find all_artifacts -type f -exec cp {} release_assets/ \;
          ls -la release_assets/

      # 提取 ChangeLog.md 中的更新日志
      - name: Extract release notes and tag
        id: extract_notes
        run: |
          TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          echo "Tag: $TAG_NAME"

          awk -v tag="$TAG_NAME" '
            /版本号格式遵循/ { start=1 }
            start { lines[++n] = $0 }
            $0 ~ "\\*\\*变动\\*\\*：\\[" tag "\\]:" {
              if (start) {
                stop=1
                exit
              }
            }
            END {
              if (stop) {
                for (i=1; i<=n; i++) print lines[i]
              } else {
              print "未找到 " tag " 对应的发布说明。"
              }
            }
          ' ChangeLog.md > /tmp/release_notes.md

          {
            echo 'release_notes<<EOF'
            cat /tmp/release_notes.md
            echo 'EOF'
            echo "tag_name=$TAG_NAME"
          } >> "$GITHUB_OUTPUT"

      # 创建或更新 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_notes.outputs.tag_name }}
          body: ${{ steps.extract_notes.outputs.release_notes }}
          files: release_assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
